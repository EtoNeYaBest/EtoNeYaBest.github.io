  server: hentai-cdn.apruxdomain.xyz
  port: 80
  uuid: 9f446ac6-593a-41e1-9b69-1fda436fbadb
  udp: true
  tls: false
  network: ws
proxy-groups:
- name: 🚫 Недоступные сайты
  type: select
  icon: https://raw.githubusercontent.com/ArThirtyFour/NeedyWebUI/refs/heads/main/icons/Icon%20Emotes/Internet.png
  proxies:
  - 🎲 Любой доступный сервер
  - https://t.me/YoutubeUnBlockRu
- name: 🎲 Торренты
  type: select
  icon: https://raw.githubusercontent.com/ArThirtyFour/NeedyWebUI/refs/heads/main/icons/Achivement/Comment%20te%20dire%20adieu.png
  proxies:
  - DIRECT
- name: 🇷🇺 RU сайты
  type: select
  icon: https://raw.githubusercontent.com/ArThirtyFour/NeedyWebUI/refs/heads/main/icons/Achivement/(Un)happy%20End%20World.png
  proxies:
  - DIRECT
- name: 🎲 Любой доступный сервер
  type: fallback
  url: https://www.gstatic.com/generate_204
  interval: 300
  hidden: true
  lazy: true
  proxies:
  - https://t.me/YoutubeUnBlockRu
- name: PROXY
  type: select
  hidden: true
  proxies:
  - 🚫 Недоступные сайты
  - https://t.me/YoutubeUnBlockRu
rule-providers:
  ru-bundle:
    type: http
    behavior: domain
    format: mrs
